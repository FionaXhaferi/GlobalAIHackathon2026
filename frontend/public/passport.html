<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reproducibility Passport · AI Scientist</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #1e293b; padding: 24px 16px; }
    .card { background: white; border-radius: 16px; border: 1px solid #e2e8f0; padding: 24px; max-width: 560px; margin: 0 auto; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #f1f5f9; }
    .icon { width: 40px; height: 40px; background: #ecfdf5; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    h1 { font-size: 17px; font-weight: 700; color: #1e3a5f; }
    .id { font-size: 11px; font-family: monospace; color: #94a3b8; margin-top: 2px; }
    .section { margin-bottom: 18px; }
    .label { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .value { font-size: 13px; color: #334155; word-break: break-all; }
    .mono { font-family: monospace; font-size: 12px; background: #f8fafc; padding: 6px 10px; border-radius: 6px; border: 1px solid #e2e8f0; }
    .tag { display: inline-block; background: #f1f5f9; border-radius: 6px; padding: 3px 8px; font-size: 11px; color: #475569; margin: 2px; }
    .reagent { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f8fafc; font-size: 12px; }
    .reagent-name { color: #334155; font-weight: 500; }
    .reagent-cat { color: #94a3b8; font-family: monospace; }
    .badge { display: inline-flex; align-items: center; gap: 6px; background: #ecfdf5; border: 1px solid #a7f3d0; color: #065f46; border-radius: 999px; padding: 4px 12px; font-size: 12px; font-weight: 600; margin-bottom: 20px; }
    .error { text-align: center; padding: 40px; color: #64748b; }
    .title-text { font-size: 15px; font-weight: 600; color: #1e3a5f; }
  </style>
</head>
<body>
  <div class="card" id="passport-card">
    <div class="error">Loading passport…</div>
  </div>

  <script>
    function decode() {
      try {
        const hash = window.location.hash.slice(1)
        if (!hash) return null
        return JSON.parse(decodeURIComponent(hash))
      } catch {
        return null
      }
    }

    function render(p) {
      const card = document.getElementById('passport-card')
      const reagentRows = (p.reagents || []).map(r =>
        `<div class="reagent">
          <span class="reagent-name">${r.name || ''}</span>
          <span class="reagent-cat">${r.catalog_number || ''} · ${r.supplier || ''}</span>
        </div>`
      ).join('')

      const softwareTags = (p.software || []).map(s => `<span class="tag">${s}</span>`).join('')
      const equipmentList = (p.equipment || []).map(e =>
        `<div class="reagent"><span class="reagent-name">${e.name}</span><span class="reagent-cat">${e.catalog_number || ''}</span></div>`
      ).join('')

      card.innerHTML = `
        <div class="header">
          <div class="icon">🛡️</div>
          <div>
            <h1>Reproducibility Passport</h1>
            <div class="id">ID: ${p.passport_id}</div>
          </div>
        </div>

        <div class="badge">✓ Verified experiment snapshot</div>

        <div class="section">
          <div class="label">Experiment</div>
          <div class="title-text">${p.plan_title || 'Untitled'}</div>
        </div>

        <div class="section">
          <div class="label">Protocol Hash</div>
          <div class="value mono">${p.protocol_hash}</div>
        </div>

        <div class="section">
          <div class="label">Analysis Random Seed</div>
          <div class="value mono">${p.random_seed}</div>
        </div>

        ${p.reagents && p.reagents.length ? `
        <div class="section">
          <div class="label">Reagents (${p.reagents.length})</div>
          ${reagentRows}
        </div>` : ''}

        ${p.equipment && p.equipment.length ? `
        <div class="section">
          <div class="label">Equipment</div>
          ${equipmentList}
        </div>` : ''}

        ${p.software && p.software.length ? `
        <div class="section">
          <div class="label">Software</div>
          <div>${softwareTags}</div>
        </div>` : ''}

        <div class="section">
          <div class="label">Generated</div>
          <div class="value">${new Date(p.generated_at).toLocaleString()}</div>
        </div>

        <div style="margin-top:20px; padding-top:16px; border-top:1px solid #f1f5f9; font-size:11px; color:#94a3b8; text-align:center;">
          Generated by AI Scientist · Fulcrum Science
        </div>
      `
    }

    const data = decode()
    if (data) {
      render(data)
    } else {
      document.getElementById('passport-card').innerHTML =
        '<div class="error">No passport data found in this link.</div>'
    }
  </script>
</body>
</html>

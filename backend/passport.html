<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reproducibility Passport · AI Scientist</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #1e293b; padding: 24px 16px 40px; }
    .card { background: white; border-radius: 16px; border: 1px solid #e2e8f0; padding: 24px; max-width: 540px; margin: 0 auto; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #f1f5f9; }
    .icon { width: 40px; height: 40px; background: #ecfdf5; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    h1 { font-size: 17px; font-weight: 700; color: #1e3a5f; }
    .id { font-size: 11px; font-family: monospace; color: #94a3b8; margin-top: 2px; }

    /* What is this banner */
    .explainer { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 10px; padding: 12px 14px; margin-bottom: 18px; font-size: 12px; color: #0369a1; line-height: 1.5; }

    /* Stats row */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
    .stat { flex: 1; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 12px; text-align: center; }
    .stat-value { font-size: 15px; font-weight: 700; color: #1e3a5f; }
    .stat-label { font-size: 10px; color: #94a3b8; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }

    .section { margin-bottom: 16px; }
    .label { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .value { font-size: 13px; color: #334155; word-break: break-all; }
    .mono { font-family: monospace; font-size: 12px; background: #f8fafc; padding: 6px 10px; border-radius: 6px; border: 1px solid #e2e8f0; }
    .hint { font-size: 11px; color: #94a3b8; margin-top: 4px; font-style: italic; }
    .tag { display: inline-block; background: #f1f5f9; border-radius: 6px; padding: 3px 8px; font-size: 11px; color: #475569; margin: 2px; font-family: monospace; }
    .badge { display: inline-flex; align-items: center; gap: 6px; background: #ecfdf5; border: 1px solid #a7f3d0; color: #065f46; border-radius: 999px; padding: 4px 12px; font-size: 12px; font-weight: 600; margin-bottom: 16px; }
    .title-text { font-size: 15px; font-weight: 600; color: #1e3a5f; }
    .error { text-align: center; padding: 40px; color: #64748b; }

    .footer { margin-top: 16px; padding-top: 14px; border-top: 1px solid #f1f5f9; font-size: 11px; color: #94a3b8; text-align: center; }
  </style>
</head>
<body>
  <div class="card" id="passport-card">
    <div class="error">Loading passport…</div>
  </div>

  <script>
    function decode() {
      try {
        const hash = window.location.hash.slice(1)
        if (!hash) return null
        return JSON.parse(decodeURIComponent(escape(atob(hash))))
      } catch {
        return null
      }
    }

    function render(p) {
      const card = document.getElementById('passport-card')
      const catalogTags = (p.cats || []).map(c => `<span class="tag">${c}</span>`).join('')
      const softwareTags = (p.sw || []).map(s => `<span class="tag">${s}</span>`).join('')
      const budgetStr = p.budget ? `$${Number(p.budget).toLocaleString()}` : '—'
      const durationStr = p.duration || '—'

      const stepStr = p.steps ? `${p.steps} steps` : '—'

      card.innerHTML = `
        <div class="header">
          <div class="icon">🛡️</div>
          <div>
            <h1>Reproducibility Passport</h1>
            <div class="id">ID: ${p.id || ''}</div>
          </div>
        </div>

        <div class="explainer">
          This QR code encodes the exact reagents, protocol fingerprint, and analysis seed needed to reproduce this experiment identically — on any device, by anyone, anywhere.
        </div>

        <div class="badge">✓ Verified experiment snapshot</div>

        <div class="section">
          <div class="label">Experiment</div>
          <div class="title-text">${p.title || 'Untitled'}</div>
        </div>

        ${p.summary ? `
        <div class="section">
          <div class="label">Summary</div>
          <div class="value" style="font-size:13px;line-height:1.5;">${p.summary}</div>
        </div>` : ''}

        ${p.endpoint ? `
        <div class="section">
          <div class="label">Primary Endpoint</div>
          <div class="value">${p.endpoint}</div>
        </div>` : ''}

        <div class="stats">
          <div class="stat">
            <div class="stat-value">${budgetStr}</div>
            <div class="stat-label">Budget</div>
          </div>
          <div class="stat">
            <div class="stat-value">${durationStr}</div>
            <div class="stat-label">Duration</div>
          </div>
          <div class="stat">
            <div class="stat-value">${stepStr}</div>
            <div class="stat-label">Steps</div>
          </div>
          <div class="stat">
            <div class="stat-value">${(p.cats || []).length}</div>
            <div class="stat-label">Reagents</div>
          </div>
        </div>

        <div class="section">
          <div class="label">Protocol Hash</div>
          <div class="value mono">${p.proto || ''}</div>
          <div class="hint">Compare with the plan to confirm it has not been modified.</div>
        </div>

        <div class="section">
          <div class="label">Analysis Random Seed</div>
          <div class="value mono">${p.seed || ''}</div>
          <div class="hint">Use this seed in R/Python to reproduce statistical results exactly.</div>
        </div>

        ${catalogTags ? `
        <div class="section">
          <div class="label">Key Reagent Catalog Numbers</div>
          <div>${catalogTags}</div>
        </div>` : ''}

        ${softwareTags ? `
        <div class="section">
          <div class="label">Software</div>
          <div>${softwareTags}</div>
        </div>` : ''}

        <div class="section">
          <div class="label">Generated</div>
          <div class="value">${p.ts ? new Date(p.ts).toLocaleString() : ''}</div>
        </div>

        <div class="footer">Generated by AI Scientist · Fulcrum Science · Global AI Hackathon 2026</div>
      `
    }

    const data = decode()
    if (data) {
      render(data)
    } else {
      document.getElementById('passport-card').innerHTML =
        '<div class="error">No passport data found in this link.</div>'
    }
  </script>
</body>
</html>
